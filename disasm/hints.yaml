    name: Sophia_IceCheck
    desc: "Decide whether Sophia is standing on ice this frame, setting Area6IceFlag ($D9) for Jason_XVelocityUpdate ($8E32) to act on. Ice exists in exactly one place in the game — tank Area 6 ($14 == $0D) — and only matters while she is grounded, so every other area and every airborne frame clears the flag unconditionally. Within Area 6 the default is slippery: the tile under her has to opt *out* by carrying a specific attribute, rather than opting in. (was Area6_IceCheck)"
  - space: prg
    offset: 0x196A4
    desc: "CMP #$0D: area $0D = Level 6 Tank; ice physics apply to solid blocks not using sub-palette 1 here (esc0rtd3w: \"Tank Ice Section\")"
  - space: prg
    offset: 0x196BD
    name: _Sophia_IceCheck__Clear
    desc: "A=0 (no slide)."
  - space: prg
    offset: 0x196BF
    name: _Sophia_IceCheck__Store
    desc: "STA $D9 (slide flag)."
  - space: prg
    offset: 0x196C2
    name: Sophia_GroundTypeCheck
    desc: "Is Sophia standing on a slow-fall surface? Classifies the tile under her and reports the answer in $98 — non-zero on the special surface that caps her descent speed (the A-button hover effect), zero on ordinary ground. Called by every Sophia movement state. (was TileCheck_Bit6)"
  - space: prg
    offset: 0x196C4
    desc: "read tile flags from LevelTileData ($0500) using ObjTileIndex ($4E)"
  - space: prg
    offset: 0x196C7
    desc: "AND #$40: test bit 6 (hover/slow-fall surface flag)"
  - space: prg
    offset: 0x196CD
    desc: "bit 6 clear: $98 = $00 (not a hover surface); RTS"
  - space: prg
    offset: 0x196D0
    name: _Sophia_GroundTypeCheck__BitSet
    desc: "bit 6 set: $98 = $80 (slow-fall/hover surface active); RTS"
  - space: prg
    offset: 0x196D5
    name: Sophia_GatewayCheck
    desc: |-
      Let the player take a Gateway by pressing DOWN while Sophia stands on one — this is how Sophia drives
      from one area to the next. Called from the ObjType-$03 (Sophia - Upright) path that runs when there was
      no Y collision ($94F4). The tile under her must pass TileCheck_GatewaySophia ($D246), which accepts
      Gateway/Doorway attributes but rejects the Tunnel type, so a Tunnel down into the overhead section stays
      TankJason-only. On acceptance it starts the transition (SetTransition $D1EF, code $01) rather than moving
      her itself; TankJason's mirror of this block is $82E4, identical except it gates on the permissive
      TileCheck_TransitionBit ($D238) and so also takes Tunnels. Both raise the same transition code $01, which
      is why one pair table (GatewayTunnel_SubTablePtrs $DD78) serves Gateways and Tunnels alike.
      (was Sophia_TunnelCheck / TunnelCheck_Sophia — Sophia takes Gateways, not Tunnels.)
  - space: prg
    offset: 0x196EA
    name: _Sophia_GatewayCheck__Done
    desc: "RTS (DOWN not pressed, or not a Sophia-passable transition tile)."
  - space: prg
    offset: 0x196EB
    name: Sophia_FireWeapon
    desc: |-
      Sophia's trigger. Fires on a NEW press of B, never on holding it, so the main gun cannot autofire. Holding DOWN at that moment diverts the shot to the currently selected sub-weapon instead of the main gun — and which sub-weapon that is comes from $BA, the same byte the pause screen's cursor column writes, so the status screen doubles as the weapon selector.

      | $BA | Sub-weapon | Spawns |
      |---|---|---|
      | 0 | Sophia_FireSubweapon_Homing ($9838) | ObjType $15 |
      | 1 | Sophia_FireSubweapon_Thunder ($99B0) | ObjType $17 |
      | 2 | Sophia_FireSubweapon_Warhead ($9AC8) | ObjType $19 |

      Each sub-weapon carries its own ammo count ($06F0/$06F1/$06F2) which its spawn routine checks and decrements; running out is handled there, not here.
      B newly pressed? No → nothing to do.
  - space: prg
    offset: 0x196FD
    name: _Sophia_FireWeapon__DispatchW1
    desc: "$BA!=0 — weapon-1 dispatch ($99B0)."
  - space: prg
    offset: 0x19703
    name: _Sophia_FireWeapon__DispatchW2
    desc: "weapon-2 dispatch ($9AC8)."
  - space: prg
    offset: 0x19706
    name: _Sophia_FireWeapon__NoFire
    desc: "RTS (fire not held)."
  - space: prg
    offset: 0x19707
    name: Sophia_FireOffsetApply
    desc: "Sign-extend $BC/$BD (X/Y velocity) to 16-bit and add to ObjXFrac:Int ($48:$49) and ObjYFrac:Int ($4A:$4B); call CalcTilemapIndex; store $BE bits 1:0 into ObjFacing ($47)"
  - space: prg
    offset: 0x1970B
    desc: "LDA $BC (X velocity); BPL → X=0 (positive), else X=$FF (negative sign extension)"
  - space: prg
    offset: 0x19711
    name: _Sophia_FireOffsetApply__XSignPos
    desc: "CLC; ADC $48 — add X velocity to ObjXFrac; TXA; ADC $49 — propagate carry+sign into ObjXInt"
  - space: prg
    offset: 0x19717
    name: JasonVelocityApply
    desc: "Apply $BC/$BD velocity pair to $48–$4B (Jason position registers)"
  - space: prg
    offset: 0x1971D
    desc: "LDA $BD (Y velocity); BPL → X=0 (positive), else X=$FF (negative sign extension)"
  - space: prg
    offset: 0x19723
    name: _Sophia_FireOffsetApply__YSignPos
    desc: "CLC; ADC $4A — add Y velocity to ObjYFrac; TXA; ADC $4B — propagate carry+sign into ObjYInt"
  - space: prg
    offset: 0x1972D
    desc: "JSR CalcTilemapIndex ($D2B9): recompute tile map position after move"
  - space: prg
    offset: 0x19730
    desc: "LDA $BE; AND #$03 → bits 1:0 = direction; STA $47 (ObjFacing)"
  - space: prg
    offset: 0x19738
    name: _Sophia_FireWeapon__FireMainGun
    desc: "Spawn the main gun shot — FindEmptyObjectSlot ($D7CF), spawn ObjType $13 (Tank Shot), clone ($D7C0), pick shot variant ($1F/$21/$22) by equipped weapon ($03FC)."
  - space: prg
    offset: 0x19748
    name: JasonInputRead
    desc: "Read $B9 from controller; call $DECC; RTS at $976C"
  - space: prg
    offset: 0x1975D
    name: _Sophia_FireWeapon__ShotTypeB
    desc: "Shot variant $21 (X=1)."
  - space: prg
    offset: 0x19763
    name: _Sophia_FireWeapon__ShotTypeC
    desc: "Shot variant $22 (X=2)."
  - space: prg
    offset: 0x19767
    name: _Sophia_FireWeapon__StoreShotType
    desc: "STX $B9 (shot type); enqueue fire SFX."
  - space: prg
    offset: 0x1976C
    name: _Sophia_FireWeapon__Done
    desc: "RTS."
  - space: prg
    offset: 0x1976D
    name: ObjHandler_Tank_13_Tank_Shot_Init
    desc: "ObjType $13 — Tank Shot (Sophia's main gun), init. Launch step for the bullet Sophia fires: it looks the shot's velocity up in per-direction tables (indexed by the firing direction) and advances to the Main $14. Dual-entry: normal play enters +3; while a fade or freeze is up ($15) it enters +0 and returns without acting. See docs/entities/tank/13-14_tank-shot.md"
  - space: prg
    offset: 0x19770
    name: _ObjHandler_Tank_13_Tank_Shot_Init__Update__
    desc: "Normal-play body — set the shot's velocity from the firing direction, go live as $14  [+3 body entry]"
  - space: prg
    offset: 0x19773
    desc: "X and Y velocity come from Tank_Section_X/Y_Velocity_Table ($9780/$9784), indexed by the firing direction"
  - space: prg
    offset: 0x1977D
    name: _ObjHandler_Tank_13_Tank_Shot_Init__Advance
    desc: "INC $46: advance ObjType $13→$14 (Tank Shot Main)"
  - space: prg
    offset: 0x1977F
    name: _ObjHandler_Tank_13_Tank_Shot_Init__Done
    desc: "RTS — YVel loaded from $9784 table, INC $46 done."
  - space: prg
    offset: 0x19780
    name: Tank_Section_X_Velocity_Table
    desc: "4 signed X velocities (00 40 00 C0) indexed by direction $B9, read by the Tank Shot init body at $9773 and stored to ObjXVel ($4C). Overlapping companion Tank_Section_Y_Velocity_Table ($9784, C0 00 40 00) supplies $4D, giving dir 0=up, 1=right, 2=down, 3=left at +/-$40 per frame."
  - space: prg
    offset: 0x19784
    name: Tank_Section_Y_Velocity_Table
  - space: prg
    offset: 0x19788
    name: ObjHandler_Tank_14_Tank_Shot_Main
    desc: |-
      ObjType $14 — Sophia's main gun shot, active. The pellet the tank cannon fires: it flies in a straight line until it hits terrain or leaves the screen, then despawns. Its firing direction, chosen at spawn, is carried in $B9 and only decides which flipped sprite it draws — all four variants move the same way. It has no homing and no per-frame decisions beyond move / draw / despawn. Dual-entry: normal play enters +3 and flies; a fade/freeze enters +0 and only redraws. See docs/entities/tank/13-14_tank-shot.md
      +0 (fade/freeze) entry: skip the movement, redraw only
  - space: prg
    offset: 0x1978B
    name: _ObjHandler_Tank_14_Tank_Shot_Main__Update__
    desc: "body: LDA #$80 → STA $42; LDA #$80 → STA $43 (SpriteOffset $80/$80)  [+3 body entry]"
  - space: prg
    offset: 0x19793
    desc: "LDA $B9 (ObjSubType 0–3); CMP #$03; BCS $979F: if subtype ≥ 3, use $D324 physics; else $D2DB"
  - space: prg
    offset: 0x1979F
    name: _ObjHandler_Tank_14_Tank_Shot_Main__PhysVariantB
    desc: "ObjSubType $B9 ≥ 3 (diagonal shot): move via JSR $D324 (MoveXY_v2); subtypes 0–2 used JSR $D2DB"
  - space: prg
    offset: 0x197A2
    name: _ObjHandler_Tank_14_Tank_Shot_Main__PostMove
    desc: "JSR $D2AB wall test; no wall → render ($97C6); wall hit → big explosion if $03FC bit1 set, else mid explosion"
  - space: prg
    offset: 0x197C0
    name: _ObjHandler_Tank_14_Tank_Shot_Main__MidExplode
    desc: "Despawn (JSR $D82C) then spawn Mid Explosion (ObjType $4A)"
  - space: prg
    offset: 0x197C6
    name: _ObjHandler_Tank_14_Tank_Shot_Main__Render
    desc: "Render/main entry (dispatch-stub target $9788): set 16×16 hitbox, JSR $EF2B; off-screen/out-of-range → despawn ($980C); else select metasprite by $B9/$47 and emit"
  - space: prg
    offset: 0x197FE
    name: _ObjHandler_Tank_14_Tank_Shot_Main__RenderFlipped
    desc: "Diagonal shot render: A = $47 & 1 (flip), JMP $F029 (multi-tile metasprite)"
  - space: prg
    offset: 0x19804
    name: _ObjHandler_Tank_14_Tank_Shot_Main__RenderSingleTile
    desc: "Cardinal shot render: tile from $9813 by $47 → $45, JMP $ECB4 (single sprite)"
  - space: prg
    offset: 0x1980C
    name: _ObjHandler_Tank_14_Tank_Shot_Main__Despawn
    desc: "Off-screen → JMP $D82C (remove shot)"
  - space: prg
    offset: 0x1980F
    name: TankShot_AttrByDir
    desc: "Tank Shot ($14) OAM attribute by shot direction $47 (4 entries: 00 40 80 00 = none / H-flip / V-flip / none). Read by _ObjHandler_Tank_14_Tank_Shot_Main__Render ($97E7) → $44 in both render paths; when shot type $B9≥2 the render ORs #$03 (palette) onto it."
  - space: prg
    offset: 0x19813
    name: TankShot_TileByDir
    desc: "Tank Shot ($14) cardinal single-tile by direction $47 (4 entries: 56 55 56 55). Read by _ObjHandler_Tank_14_Tank_Shot_Main__RenderSingleTile ($9804) → $45, JMP $ECB4 — the shot-type $B9=0 path."
  - space: prg
    offset: 0x19817
    name: TankShot_DiagMetaSpritePtr
    desc: "LE pointer (=$9819) to TankShot_DiagMetaSpriteTable, loaded into DispatchPtr ($7A/$7B) at $97DB before JMP $F029 — the $B9>0 (multi-tile) shot render. A private metasprite table ($F029 renders from the $7A/$7B pointer, not the global tank table $8907). addrtable:1 candidate."
  - space: prg
    offset: 0x19819
    name: TankShot_DiagMetaSpriteTable
    desc: "2 LE pointers to the diagonal Tank Shot metasprite defs, indexed by flip ($47 & 1) via $F029: flip 0 → $9829, flip 1 → $981D. addrtable:2 candidate."
  - space: prg
    offset: 0x1981D
    name: TankShot_DiagMetaSpriteDefs
    desc: "2 metasprite defs ([Xoff,Yoff,ctrl,tile]) for the diagonal Tank Shot, rendered by $F029 via TankShot_DiagMetaSpriteTable: flip-1 @$981D (tiles $4B/$4C/$4D), flip-0 @$9829 (tiles $48/$49/$4A)."
  - space: prg
    offset: 0x19835
    name: TankShot_CullParamByType
    desc: "Tank Shot ($14) off-screen visibility-cull parameter passed to Sprite_Update ($D7A0), indexed by shot type $B9 (3 entries: 04 06 08). Read by _ObjHandler_Tank_14_Tank_Shot_Main__Render ($97D3)."
  - space: prg
    offset: 0x19838
    name: Sophia_FireSubweapon_Homing
    desc: "Sub-weapon 0 (homing) launch: scan enemy object slots (offset $02 from $54, +$0E ×12); for each slot whose ObjType ≥ $54 (valid target), if homing ammo $06F0>0 spawn Homing Missile (ObjType $15) into an empty slot, store the target slot index in $040A,x and decrement ammo"
  - space: prg
    offset: 0x1983E
    name: _Sophia_FireSubweapon_Homing__Loop
    desc: "Per-slot body: bail if no ammo ($06F0=0) or slot ObjType < $54; else find empty slot ($D7CF), consume ammo, clone ($D7C0), spawn ObjType $15 locked onto target"
  - space: prg
    offset: 0x1986C
    name: _Sophia_FireSubweapon_Homing__Next
    desc: "Advance to next target slot (+$0E); stop after 18 slots (counter $06..$12)"
  - space: prg
    offset: 0x19880
    name: _Sophia_FireSubweapon_Homing__Pop
    desc: "PLA loop counter (no empty slot found) then RTS"
  - space: prg
    offset: 0x19881
    name: _Sophia_FireSubweapon_Homing__Done
    desc: "RTS — all target slots scanned"
  - space: prg
    offset: 0x19882
    name: ObjHandler_Tank_15_Homing_Missile_Init
    desc: "ObjType $15 — Homing Missile (player sub-weapon), init. Spawns the missile at the firing point (adds the $BC/$BD aim offset to its position and copies the facing), seeds an initial ±$10 velocity from a 4-direction table, sets its homing counters, plays the launch SFX, and advances to the Main homing handler ($16). The 3 leading NOPs pad the +0 (fade) entry so both entries run the one body. See docs/entities/tank/15-16_homing-missile.md"
  - space: prg
    offset: 0x19885
    name: _ObjHandler_Tank_15_Homing_Missile_Init__Update__
    desc: "+3 body entry: clear this slot's OAM sprites"
  - space: prg
    offset: 0x19888
    desc: "position at the firing point (Sophia_FireOffsetApply: add the $BC/$BD aim offset, copy facing)"
  - space: prg
    offset: 0x1988B
    desc: "seed initial velocity from the 4-direction table (X = facing)"
  - space: prg
    offset: 0x19895
    desc: "advance to the Main homing handler ($16)"
  - space: prg
    offset: 0x19897
    desc: "seed the homing counters ($51/$52=$C0)"
  - space: prg
    offset: 0x1989D
    desc: "play the launch SFX ($2F)"
  - space: prg
    offset: 0x198A3
    name: TankHomingMissile_Vel_ByDir
    desc: "Overlapping 4-direction velocity pair: YVel = $98A3[dir] (F0 00 10 00), XVel = $98A4[dir] (00 10 00 F0) - up/right/down/left at +/-$10. Read at $988B/$9890 into $4C/$4D, just before INC $46 advances the ObjType."
  - space: prg
    offset: 0x198A8
    name: ObjHandler_Tank_16_Homing_Missile_Main
    desc: |-
      ObjType $16 — Homing Missile, active. Sophia's tracking sub-weapon: while its target slot ($50) still holds a live object, it nudges its X and Y velocity two units per frame toward that object's position (and damps toward zero once aligned on an axis), so it curves after the enemy rather than flying straight. If the target dies or was never set it just coasts. It also runs a lifetime counter $51; when that expires it turns into the shared missile-death effect. Dual-entry: normal play enters +3 and homes; a fade/freeze enters +0 and only redraws. See docs/entities/tank/15-16_homing-missile.md
      +0 (fade/freeze) entry: skip the homing, redraw only
  - space: prg
    offset: 0x198AB
    name: _ObjHandler_Tank_16_Homing_Missile_Main__Update__
    desc: "body (alternate entry): LDA #$80 → STA $42; LDA #$80 → STA $43 (SpriteOffset)  [+3 body entry]"
  - space: prg
    offset: 0x198B3
    desc: "multi-slot liveness tracking: $50=slot index, $52=liveness flag; DEC $51 animation counter"
  - space: prg
    offset: 0x198BD
    name: _ObjHandler_Tank_16_Homing_Missile_Main__Track
    desc: "Anim counter $51 not expired; if target flag $52=0 skip homing; load target slot $50; dead target ($0400,x=0) → clear $52 and skip to physics ($9916)"
  - space: prg
    offset: 0x198CC
    name: _ObjHandler_Tank_16_Homing_Missile_Main__HomeX
    desc: "Target alive: X delta = target $0403,x − $49; steer XVel toward target"
  - space: prg
    offset: 0x198DF
    name: _ObjHandler_Tank_16_Homing_Missile_Main__HomeXNeg
    desc: "Target left: XVel ($4C) −= 2"
  - space: prg
    offset: 0x198E4
    name: _ObjHandler_Tank_16_Homing_Missile_Main__HomeXStore
    desc: "Store steered XVel ($4C)"
  - space: prg
    offset: 0x198E9
    name: _ObjHandler_Tank_16_Homing_Missile_Main__HomeXAlign
    desc: "X aligned (delta 0): nudge XVel toward 0 via $EB14 (#$10 step on $4C)"
  - space: prg
    offset: 0x198F0
    name: _ObjHandler_Tank_16_Homing_Missile_Main__HomeY
    desc: "Y delta = target $0405,x − $4B; steer YVel toward target"
  - space: prg
    offset: 0x19905
    name: _ObjHandler_Tank_16_Homing_Missile_Main__HomeYNeg
    desc: "Target up: YVel ($4D) −= 2"
  - space: prg
    offset: 0x1990A
    name: _ObjHandler_Tank_16_Homing_Missile_Main__HomeYStore
    desc: "Store steered YVel ($4D)"
  - space: prg
    offset: 0x1990F
    name: _ObjHandler_Tank_16_Homing_Missile_Main__HomeYAlign
    desc: "Y aligned (delta 0): nudge YVel toward 0 via $EB14 (#$10 step on $4D)"
  - space: prg
    offset: 0x19916
    name: _ObjHandler_Tank_16_Homing_Missile_Main__Move
    desc: "JSR $D2DB apply velocity; fall through to render ($9919)"
  - space: prg
    offset: 0x19919
    name: _ObjHandler_Tank_16__Render
    desc: "24×24 hitbox ($40=$18, $41=$18); JSR ScreenPos_Compute ($EF2B)"
  - space: prg
    offset: 0x19924
    desc: "BEQ $9929: no hit → continue; hit → JMP $9B90 (transition to ObjType $4B)"
  - space: prg
    offset: 0x19929
    name: _ObjHandler_Tank_16_Homing_Missile_Main__HitTest
    desc: "No bullet collision: JSR $D7A0 #$08 visibility cull; off → despawn ($D82C)"
  - space: prg
    offset: 0x19933
    name: _ObjHandler_Tank_16_Homing_Missile_Main__RenderRotated
    desc: "Live target: angle to target via $D161 on (dx,dy) → $47; derive frame; JMP $F029"
  - space: prg
    offset: 0x19965
    name: _ObjHandler_Tank_16_Homing_Missile_Main__RenderDefaultAngle
    desc: "No target: default angle index #$04"
  - space: prg
    offset: 0x19967
    name: _ObjHandler_Tank_16_Homing_Missile_Main__RenderEmit
    desc: "A = angle + $47, JSR $F029 (emit rotated missile metasprite)"
  - space: prg
    offset: 0x1996E
    name: TankMissile_MetaSpritePtr
    addressTableEntries: 1
    desc: "LE self-pointer (=$9970) to TankMissile_MetaSpriteTable, loaded into DispatchPtr ($7A/$7B) before A=index → JSR $F029 by both missile projectiles that use this private sprite: the Homing Missile ($16, _ObjHandler_Tank_16_Homing_Missile_Main__RenderRotated $9937) and the Multi-Warhead ($1A, _ObjHandler_Tank_1A__Render $9B5F). Private metasprite table: $F029 (MetaSprite_RenderNoBank) renders from the $7A/$7B pointer instead of the global tank table Metasprite_Table_Tank ($8907)."
  - space: prg
    offset: 0x19970
    name: TankMissile_MetaSpriteTable
    addressTableEntries: 8
    desc: "8 LE pointers to the missile metasprite defs, indexed by (($10 frame-bit → 0 or 4) + $47 direction) — $47 = 0–3 cardinal direction from Obj_QuadrantFromDelta ($D161). So it is 4 directions × 2 animation frames: entries 0–3 = 2-tile (head + exhaust tail), 4–7 = 1-tile (no tail), alternating each frame to flicker the exhaust. Entries → $9980/$9988/$9990/$9998/$99A0/$99A4/$99A8/$99AC (= TankMissile_MetaSpriteDefs)."
  - space: prg
    offset: 0x19980
    name: TankMissile_MetaSpriteDefs
    desc: "8 metasprite defs (entry format [Xoff,Yoff,ctrl,tile]; ctrl bit6=Hflip, bit7=Vflip, bit4=terminator) for the rotating missile sprite shared by Homing Missile ($16) and Multi-Warhead ($1A). Built from 2 CHR pairs + flips — vertical head $7F + tail $56 (dir 0 down $9980 / dir 2 up $9990 Vflip) and horizontal head $6F + tail $55 (dir 1 left $9988 Hflip / dir 3 right $9998); 1-tile frames drop the tail ($99A0 $7F / $99A4 $6F Hflip / $99A8 $7F Vflip / $99AC $6F). Rendered by $F029 via TankMissile_MetaSpriteTable."
  - space: prg
    offset: 0x199B0
    name: Sophia_FireSubweapon_Thunder
    desc: "Sub-weapon 1 (Thunder Break) launch: find empty slot ($D7CF, X=$46); if ammo $06F1>0 decrement it and spawn ObjType $17 (Lightning/Thunder Init), then clone ($D7C0)"
  - space: prg
    offset: 0x199CB
    name: _Sophia_FireSubweapon_Thunder__Done
    desc: "RTS — no free slot or no ammo"
  - space: prg
    offset: 0x199CC
    name: ObjHandler_Tank_17_Lightning_Init
    desc: |-
      ObjType $17 — Thunder Break (Lightning), init. Sophia's downward sub-weapon: picks one of three bolt shapes, then hands over to $18. The shape is chosen from the low bits of the NMI counter $10, so which bolt you get depends on when in the frame cycle you fired — it looks random in play but is not RNG-driven. Dual-entry, but as with the explosions the +0 entry is three NOPs falling through into the body, so a fade/freeze runs the same init. See docs/entities/tank/17-18_lightning.md
      +0 (fade/freeze) entry: three NOPs falling through into the body
  - space: prg
    offset: 0x199CF
    name: _ObjHandler_Tank_17_Lightning_Init__Update__
    desc: "Normal-play body — choose the bolt shape and arm it. $50 (ObjPhase, the descent/animation step) and $4F (animation state) both start at 0.  [+3 body entry]"
  - space: prg
    offset: 0x199D5
    desc: "shape select = NMI counter $10 mod 4. Note $10 is the NMI counter (bumped in the every-NMI sound tail), not the frame counter $11 (bumped only in the full-frame video tail)."
  - space: prg
    offset: 0x199D9
    desc: "the table has only 3 entries, so the fourth value folds back onto shape 0 — shape 0 therefore comes up twice as often as shapes 1 and 2"
  - space: prg
    offset: 0x199DF
    name: _ObjHandler_Tank_17__OrientLookup
    desc: "$47 = the chosen shape's base index (0, 8 or $10) into the three 24-entry segment tables — it is used purely as a table base here, not as a heading."
  - space: prg
    offset: 0x199E5
    desc: "advance to the active handler $18"
  - space: prg
    offset: 0x199E7
    desc: "Thunder Break SFX $4D"
  - space: prg
    offset: 0x199ED
    name: TankLightning_OrientBase
