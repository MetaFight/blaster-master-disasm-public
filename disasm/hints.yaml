    offset: 0x03FB
    name: BossesDefeated
    desc: "Per-boss \"defeated\" bitfield (OR'd in at the boss-defeat handler $A109 via the $A072 mask). For the area-8 final boss, bit7 is set when PHASE 1 dies; Overhead_LoadNametable ($C742) tests it (BPL) to pick the boss-room background — clear → Cat09 (phase 1), set → Cat0A (phase 2, re-entered after the brief between-phase return to the overhead-8 room)."
  - space: ram
    offset: 0x03FC
    name: SophiaPowerUps
    desc: "Sophia's acquired power-ups — the bitfield the GAMEPLAY code gates on. A bit is set when the corresponding area's overhead boss dies: the boss-defeat award ($A03B, bank 04) ORs in OvhdBoss_AreaBitMask_Table[$14 & 7] = 1 << (area-1). So **bit i = the award from area i+1's boss**: bit0 HYPER (area 1), bit1 CRUSHER (2), bit2 HOVER (3), bit3 KEY (4), bit4 DIVE (5), bit5 WALL 1 (6), bit6 WALL 2 (7); area 8 (the final boss) awards nothing. CAUTION — this is NOT the same bit order as PauseScreen_SophiaPowerUps ($99), which holds the same set of items in the pause screen's own layout order; the same award site remaps area→display bit through the table at $A050 (40 10 01 80 02 04 08 00) before OR-ing into $99. Confusing the two maps is an easy and load-bearing mistake (it reads bit0 as HOVER instead of HYPER). Gameplay readers, each confirming the mapping: Sophia_FireWeapon $974B (bit0 = Hyper gun) and $97AA (bit1 = Crusher), ObjHandler_Tank_03_Sophia_Upright $92FE (bit2 = Hover, paired with the hover-fuel check), GateOpenBlock $9E69 (bit3 = Key), ObjHandler_Tank_91_Wall_Guardian_Main $BAE3 (bit0). Distinct from BossesDefeated ($03FB), which takes the same $A072 mask at a different site."
