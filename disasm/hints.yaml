    name: Dmc_SampleData
    desc: "DPCM drum sample data — the single drum sample behind Dmc_SampleTable entries 0/1 ($4012=$FB → $C000+$FB×64 = $FEC0; $4013=$11 → $11×16+1 = 273 bytes), played at rates $0B/$0A as the story-sequence percussion. Only the first 273 bytes ($FEC0–$FFD0) are ever played, but the data itself runs on to $FFD7 — see Dmc_SampleData_UnplayedTail. Sits in the fixed bank below the bank-end padding and the reset stub/vectors. See docs/misc/dmc-percussion-bug.md."
  - space: prg
    offset: 0x1FFD1
    name: Dmc_SampleData_UnplayedTail
    desc: "The last 7 bytes of the drum sample (81 0F 80 9F C7 1F 00), which the DMC hardware can never reach. Dmc_SampleData's bytes run contiguously from $FEC0 to $FFD7 = 280 bytes, but $4013 encodes a sample length as L×16+1, so the descriptor's $11 buys 273 bytes ($FEC0–$FFD0) and the next legal step ($12 → 289) would overrun the data into the padding below. 273 is therefore the longest length that fits, and these 7 bytes are unaddressable — an artifact of the length quantization clipping the encoded sample's tail, not padding (they are not $FF) and not a separate structure (no gap separates them from the sample). Never read: the only descriptors that would reach them are Dmc_SampleTable entries 2/3 (len $20 = 513 bytes, which would run through the padding, the reset stub and the vectors before wrapping to $8000), and those entries are unused."
  - space: prg
    offset: 0x1FFD8
    name: Bk07_BankEndPadding
    isDead: true
    desc: "Unused $FF bank-end padding ($FFD8-$FFF3, 28 bytes). Fills the gap between the end of the drum sample's bytes ($FFD7) and the reset stub at $FFF4. Never read. NB bank 07 has no BankEndStrayBytes label: its $FFF4-$FFFF is the live Reset stub + CpuVectors — the ORIGINAL that every other bank carries a stale image of (see docs/misc/bank-tail-residue.md)."
  - space: prg
    offset: 0x1FFF4
    name: Reset
    desc: "Reset vector target ($FFFC): INC $FFF4 / JMP HardwareInit ($F23B). The INC's read-modify-write stores bytes with bit 7 set ($EE then $EF) to the $8000–$FFFF mapper port, resetting the MMC1 shift register and forcing PRG mode 3 (this fixed bank at $C000) — the standard MMC1 reset stub, guaranteeing HardwareInit is mapped regardless of the mapper's power-on/reset state."
  - space: prg
    offset: 0x1FFF7
    desc: "Power-on entry (reset vector → $FFF4): the INC's ROM write targets the MMC1 port (resets the mapper shift register); JMP HardwareInit."
  - space: prg
    offset: 0x1FFFA
    name: CpuVectors
    addressTableEntries: 3
    desc: "The 6502 hardware vectors: NMI ($FFFA), Reset ($FFFC), IRQ ($FFFE). The CPU fetches them from these exact addresses, so --relocatable pins them in their own VECTORS segment; the .addr operands let ld65 repoint them after a resize."
