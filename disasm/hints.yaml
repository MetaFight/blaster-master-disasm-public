    name: TankJason_HitCheck
    desc: |-
      Work out whether Jason took damage this frame, and apply it. Two independent sources feed one damage path: an enemy that hit him, and a lethal/hazard tile he is standing in.

      The enemy case comes back from Sprite_Update ($D7A0), which returns the PREVIOUS $7E,x and masks bit 7 off as it writes — so an attacker posts a hit by setting bit 7 there, and carries the **damage magnitude in bits 0–6**. Bit 7 is the hit flag, `AND #$7F` is the amount. The tile case substitutes a fixed magnitude of $40 instead.

      Whatever the source, the amount is **doubled** before being subtracted from health $53, and an underflow floors it at 0 rather than wrapping. A successful hit also knocks Jason into the jump state, starts a $20-frame stun/invincibility window in $4F, and plays SFX $33.

      Skipped entirely while $4F is non-zero (already stunned — this is the invincibility window) or health is already 0.
