  - space: ram
    offset: 0x0012
    name: NmiFrameFlag
    desc: "Set by NMI; main loop waits on it"
  - space: ram
    offset: 0x0013
    name: RNG_State
    desc: "Pseudo-random number generator state — the value the enemy-drop and boss-AI docs call \"RNG\". Stepped by Step_RNG ($EB71) as an 8-bit LCG: $13 := ($13×5 − 1) mod 256; the dispatch-slot getter DispatchSlot_91_Step_RNG ($C1B3 = JMP $EB71) advances it and returns the new byte in A. Seeded to $00 by LevelInit ($C30A). Consumers read the low bits for a random magnitude and bit 7 for a random ± sign/direction: grenade-blast scatter (ObjHandler_Ovhd_11 via $C1B3), Boss Fred jump-target sign ($97B0), Eye-Spawner coord swap ($BB27), boss death-explosion scatter ($A0E4), enemy drop-chance rolls. Also reused as a frame-pacing tick in story sequences (StorySequence_FramePaced $E4A6 → $58). Only banks 04 and 07 touch it directly (no sound-engine use). See docs/misc/rng.md."
  - space: ram
    offset: 0x0014
    name: Current_Area_14
    desc: "Current area + mode: bit 3 = tank/overhead flag, low 3 bits = area-1 (0-7). So overhead A1-8 = idx $00-$07, tank A1-8 = idx $08-$0F. Read as the area index via AND #$07 (e.g. Boss_ObjTypeByArea $9FE6; $14==7 -> area 8) or AND #$0F (e.g. LoadAreaStartPos $CA14). Demo path stores $08 (tank A1); table 08 01 0A 03 at $C2F7. Verified live in Mesen via AreaChr_BankHi_Table. (Corrected from the earlier \"area * 8 (Area 2 = $10)\" reading.)"
  - space: ram
    offset: 0x0015
    name: ScreenFade_Flags
    desc: |-
      Palette-wipe + freeze flags. Master effect: any NON-ZERO value makes RunObjectHandler ($C9C4: LDA $15 / BNE) dispatch every object slot to its +0 render/no-physics entry — render-but-don't-tick (the dual-entry gate), i.e. a freeze. Only bits 0,1,6,7 are ever written; bits 2–5 are unused (always 0). Writers: $C338 clears all (state reset); FadeIn_Init $CE0F does AND #$01/ORA #$80 (sets bit7, **preserves bit0**); $CE2B/$D1F5 ORA #$40 (bit6); $CE0C AND #$3F (clears bit6/7); $C42E EOR #$01 (bit0); $A027/$A031 set/clear bit1.
      bit 7 = fade-in active (B6 decrements 8→0, brightens; tested by BMI at $CE37/$F86E)
      bit 6 = fade-out active (B6 increments 0→9, darkens; tested by BVS at $CE45/$F887)
      bit 1 = boss-room drop/approach freeze, set by ObjHandler_Ovhd_6A_Boss_Drop_Main ($A027 ORA #$02 on contact, $A031 AND #$FD to clear on departure)
      bit 0 = BOSS-FIGHT PAUSE (freeze). START in boss mode ($C5 bit1 set, B6=0) toggles it at $C42A/$C42E (EOR #$01); set → the whole fight freezes while still rendering, second START clears it → resume. (Non-boss START opens the status screen via PauseScreen_Entry $C55D instead.) Confirmed dynamically: area-3 overhead boss, object table moving 26/40 frames → 1/24 when bit0 set → 23/24 after clearing.
