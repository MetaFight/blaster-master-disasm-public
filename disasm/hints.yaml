      Apply ObjYVel ($4D) to Y position only ($4A/$4B); if carry into tile row: adjust ObjTileIndex ($4E) by ±17
      clear carry bit from ObjYInt ($4B) before velocity add (tile-row carry flag lives in bit 7)
  - space: prg
