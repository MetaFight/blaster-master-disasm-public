    desc: "Not sound data - 241 bytes ($BEF1-$BFE1) that are a byte-identical copy of bank 04's tail over the same addresses: the Red Gumdrop handlers ObjHandler_Ovhd_46/47 (from the middle of $46's body), OvhdBoss_AreaBitMask_Table, and its $FF padding. Build residue: each bank was assembled into a shared 16 KB buffer that was not cleared between banks, so a bank whose real content stops early keeps the previous image's bytes. The same residue appears in banks 02/03 (an older revision of the same bank-04 code, shifted 1 byte) and bank 00 (older still). Never executed - bank 05 is only ever mapped in for sound. Left as .byte because its JSR operands ($B2B4/$B243/$B264/$B2C5) are bank-04 addresses that would resolve to unrelated sound routines if decoded here."
