  - space: ram
    offset: 0x0047
    name: LoadedObject_Facing
    desc: "Which way this object is pointing. Working copy of slot byte +1 ($0401,X, PlayerObj_Facing), loaded by RunObjectHandler's slot copy-in ($C8DF). The ENCODING is ObjType-defined, so read it against the handler that owns it: (a) 8-bit heading angle, 0–255 = full circle — the shared enemy physics convention, consumed by Obj_AngleToVelocity ($E1BD, $4C/$4D = cos/sin × speed), Obj_ReflectHeading ($E0D0/$E0D8, mirrors it off a wall) and Obj_TurnHeading ($E07B, += $52); ~29 call sites across banks 04/06, e.g. the Shooter ($76 seeds it from the RNG) and the Jellyfish ($80 seeds it to $B8 and jets along it). (b) 2-bit direction index 0–3, masked AND #$03 and used as a table index — overhead player (Obj_StepPositionByFacing $8E95) and Boss3 Photophage (FindLiveSegment $A309 scans directions with INC $47). (c) facing bit-flags in bits 7/6, tested with BIT — tank Jason (_ObjHandler_Tank_1B_Jason__FaceFromInput $818E). It does NOT gate the handler's dual entry: that is $15 (ScreenFade_Flags) at RunObjectHandler $C9C4."
