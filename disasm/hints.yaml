  - space: prg
    offset: 0x1D2DB
    name: MoveXY
    desc: "Apply ObjXVel ($4C) and ObjYVel ($4D) to position registers with carry-aware 16-bit fixed-point arithmetic"
  - space: prg
    offset: 0x1D2DE
    name: MoveX
    desc: |-
      Apply X velocity ($4C, signed) to X position ($48:$49); on page crossing adjust $49 (high byte) and $4E (tile index); symmetric with MoveY ($D2FE)
      AND #$7F on ObjXInt ($49): clear reserved bit 7 before add
  - space: prg
