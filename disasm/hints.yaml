    name: TankJason_TryBoardSophia
    desc: "Can Jason climb back into Sophia this frame? Called once, from the Jason on-foot handler ($8347). Three things must hold: the player newly pressed SELECT, Sophia is parked in the area Jason is currently in, and Jason is lined up with her — loosely in X (roughly half a screen either side) but tightly in Y, so he effectively has to be standing on her level. When they all hold Jason morphs into the Embarking ObjType $1D, is snapped horizontally onto Sophia's parked position, and is given an upward kick plus a transition timer so the hop-in animation can play out. Single caller. (was SophiaAlignCheck)"
