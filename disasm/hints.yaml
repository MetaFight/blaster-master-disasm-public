    desc: "Sound-engine per-channel state. $0700-$07B3 is a structure-of-arrays: 20 fields spaced 9 bytes apart ($0700+9*F), each a 9-entry array indexed by channel (X=1..8; index 0 reserved). Driver at $8013 loads channels from a song descriptor; per-frame update loop at $8077/$808C. Field0 = flags: bits0-1 = APU channel (0/1/2/3 = pulse1/pulse2/triangle/noise), bit6 = note-triggered, bit7 = legato/tie (suppresses $4003 length-counter reload on a new note)"
  - space: ram
    offset: 0x0709
    name: SoundCh_ApuReg0
    desc: "Field1: value written to APU reg0 ($4000+ch*4) = duty/volume/envelope-control byte; set by the $A0-$AF stream command"
  - space: ram
    offset: 0x0712
    name: SoundCh_ApuReg1
    desc: "Field2: value written to APU reg1 ($4001+ch*4) = sweep byte; set by the $A0-$AF stream command"
  - space: ram
    offset: 0x071B
    name: SoundCh_DataPtrLo
    desc: "Field3: current music-data stream pointer, low byte"
  - space: ram
    offset: 0x0724
    name: SoundCh_DataPtrHi
    desc: "Field4: music-data stream pointer high byte; $00 = channel inactive (also serves as the channel-active flag; per-frame loop skips the channel when zero)"
  - space: ram
    offset: 0x072D
    name: SoundCh_NoteTimer
    desc: "Field5: note-duration countdown; decremented each frame, next note/command read when it reaches 0 (init 1 so the first frame fetches immediately)"
  - space: ram
    offset: 0x0736
    name: SoundCh_LoopCtr1
    desc: "Field6: repeat/loop counter (outer); used by the $B0-$BF stream loop command"
  - space: ram
    offset: 0x073F
    name: SoundCh_LoopCtr2
    desc: "Field7: repeat/loop counter (inner); second level of the $B0-$BF stream loop command"
  - space: ram
    offset: 0x0748
    name: SoundCh_PitchModCtrl
    desc: "Field8: pitch-modulation (vibrato/slide) control byte; bit7 = enable, bit6 = direction, bit4 = mode, low nibble = step/rate. Drives $82CE"
  - space: ram
    offset: 0x0751
    name: SoundCh_EnvPtrLo
    desc: "Field9: volume/duty envelope data pointer, low byte; set by the $C2 stream command"
  - space: ram
    offset: 0x075A
    name: SoundCh_Detune
    desc: "Field10: pitch detune offset added to the note period low byte ($4002+ch*4)"
  - space: ram
    offset: 0x0763
    name: SoundCh_EnvPos
    desc: "Field11: current position/index into the envelope data; advanced each frame by $835C"
  - space: ram
    offset: 0x076C
    name: SoundCh_EnvPtrHi
    desc: "Field12: envelope data pointer high byte (+ loop-mode flags in bits 5/4); set by the $C2 stream command"
  - space: ram
    offset: 0x0775
    name: SoundCh_CallStackPtr
    desc: "Field13: music-data call-stack pointer, low byte (base 9*X+$80, high byte $01 -> stack lives at $0180+9*X in page 1; 3-byte frames: ptrLo/ptrHi/returnY). Pushed by the $E0-$EF subroutine-call command, popped by its return; supports nested pattern calls"
  - space: ram
    offset: 0x077E
    name: SoundCh_Unused
    desc: "Field14: reserved/unused (no references in any bank)"
  - space: ram
    offset: 0x0787
    name: SoundCh_EnvCtrl
    desc: "Field15: envelope control/state byte; bit7 = enable, bit5 = done, bit4 = mode, low nibble = counter; set by the $C2 stream command, gates $835C"
  - space: ram
    offset: 0x0790
    name: SoundCh_PeriodLo
    desc: "Field16: current note period low byte, cached from the pitch table at $83EE (2 bytes/note)"
  - space: ram
    offset: 0x0799
    name: SoundCh_PitchModAccum
    desc: "Field17: pitch-modulation accumulator; added to the period low byte written to $4002+ch*4"
  - space: ram
    offset: 0x07A2
    name: SoundCh_PitchModTimer
    desc: "Field18: pitch-modulation countdown timer; reloaded from SoundCh_PitchModReload ($07AB) when it expires"
  - space: ram
    offset: 0x07AB
    name: SoundCh_PitchModReload
    desc: "Field19: pitch-modulation reload period -> SoundCh_PitchModTimer ($07A2)"
  - space: ram
    offset: 0x07F0
    name: DmcDriver_DataPtrLo
    desc: "DMC/sample-track sequencer (single stream, separate from the 8 music channels; driver at $BDF6/$BE23). Data-stream pointer low byte. Drives the DPCM channel: writes APU $4010-$4013 and enables DMC via $4015=$1F"
  - space: ram
    offset: 0x07F1
    name: DmcDriver_DataPtrHi
    desc: "DMC track data-stream pointer high byte; $00 = track inactive (BEQ guard at $BE26); set to 0 to stop the DMC track"
  - space: ram
    offset: 0x07F2
    name: DmcDriver_NoteTimer
    desc: "DMC track note/frame countdown timer; decremented each tick ($BE2A), next command read at 0"
  - space: ram
    offset: 0x07F3
    name: DmcDriver_LoopCtr1
    desc: "DMC track repeat/loop counter (outer); $B0-range command"
  - space: ram
    offset: 0x07F4
    name: DmcDriver_LoopCtr2
    desc: "DMC track repeat/loop counter (inner); $B0-range command"
  - space: ram
    offset: 0x07F5
    name: DmcDriver_Flags
    desc: "DMC track flags; bit0 = rest/skip flag — set by the $A0-range rest command so the shared play path silences DMC ($4015=$0F) WITHOUT loading $4010–$4013 from the sample table at $BDBE; cleared at the end of every play/rest command ($BEA6)"
  - space: ram
    offset: 0x07FF
    name: SoundEngine_Scratch
    desc: "Shared scratch/temp byte for the sound engine (e.g. holds X while computing the call-stack base at $805E; SBC operand in the pitch-mod helper at $831A/$8321)"
