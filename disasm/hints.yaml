    name: Bk02_SoundDataResidue
    isDead: true
    desc: "Build residue, not level data — 588 bytes ($BCA5-$BEF0) of an OLD bank-05 image (sound/music stream data: the repeating `41 06 01 04` records match the bank-05 channel-stream grammar). It does not match the shipped bank 05 at any shift, so it is an older revision of the sound data. Proof it is residue and not bank 02's own data: banks 02 and 03 — two unrelated level-data banks — are byte-identical from $BCA5 to $BFFF (859 bytes), which cannot be coincidence. NOTE: the residue may begin EARLIER than $BCA5; $BCA5 is only the point where bank 03's own data (TankLvl8_ThingYList) stops and the two banks converge, so it is a lower bound. The true start depends on OvhdLvl7_ComboAttrTable's real extent, which is still unknown (every other overhead level's combo-attr table is 73-112 bytes, which would put the real end near $BA52 — see docs/misc/bank-tail-residue.md). Never executed. See docs/misc/bank-tail-residue.md"
  - space: prg
    offset: 0xBEF1
    name: Bk02_Bank04TailResidue
    isDead: true
    desc: "Build residue — 241 bytes ($BEF1-$BFE1) that are an image of bank 04's tail relocated 1 byte later (residue addr = final addr + 1): ObjHandler_Ovhd_46/47 (Red Gumdrop), OvhdBoss_AreaBitMask_Table, $FF padding. All 7 differences from the shipped bank 04 are absolute operands pointing into the window (shifted by the same +1); there are no code differences, so this image postdates bank 04 reaching its shipped form. NEWER than bank 00/01's residue (which is −4 and carries a real code difference), OLDER than bank 05's (which is an exact 0-shift copy). Identical in bank 03. Never executed. See docs/misc/bank-tail-residue.md"
  - space: prg
    offset: 0xBFE2
    name: Bk02_SoundTrampolineResidue
    isDead: true
    desc: "18 bytes ($BFE2-$BFF3) — residue copy of bank 05's 6-slot sound trampoline block. Unlike bank 00/01's copy, these are the FINAL entry points (JMP $0000 / $8000 / $8013 / $0000 / $0000 / $8077), matching the shipped bank 05 — one of the two independent clocks dating bank 02/03 later than bank 00/01. Dead here. Identical in bank 03. See docs/misc/bank-tail-residue.md"
  - space: prg
    offset: 0xBFF4
    name: Bk02_BankEndStrayBytes
    isDead: true
    desc: "12 bytes ($BFF4-$BFFF) — a residue image of BANK 07's tail: `EE F4 FF 4C 32 F2 00 00 F4 FF FF FF`. The JMP operand reads $F232, where the shipped bank 07 has JMP $F23B — so bank 07's reset handler moved 9 bytes later after this image was captured. This is Clock 3, the third independent dating signal. Identical in bank 03. See docs/misc/bank-tail-residue.md."
