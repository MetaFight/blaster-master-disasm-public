    desc: "Render one of Boss 2's two articulated pincer arms. A on entry = the arm's slot-index base ($00 or $14), stored to $06. On the active frame ($4F|$03FD|$15 all 0) it seeds the per-segment velocity from Boss2_PincerArms_ArmVelSeed ($9D6F, indexed by $44 direction bit) into $07-$0A and calls Boss2_PincerArms_ClampAllSegments ($9DA4). Then loops $05=6..0 (7 segments): accumulate the segment velocity ($0670/$0671,X) into running position $3E/$3F, draw a 3-tile vertical sprite (tiles $C7/$C9/$CB via $C18C), apply palette flash ($C090), and when the arm tip overlaps the player ($3E/$3F within $40 of $7C) spawn a contact-hit child (ObjType $75 via $C1F5)."
