    offset: 0x3D8C
    name: Bk00_Bank04TailResidue
    isDead: true
    desc: "Build residue, not level data — 514 bytes ($BD8C-$BF8D) that are an OLD image of bank 04's tail, relocated 4 bytes earlier (residue addr = final addr − 4): the tail of ObjHandler_Ovhd_46_Red_Gumdrop_Init's body, all of ObjHandler_Ovhd_47_Red_Gumdrop_Main, and OvhdBoss_AreaBitMask_Table. 20 bytes differ from the shipped bank 04: 19 are absolute operands pointing into the window (shifted by the same −4), and exactly 1 is a real code difference — the JSR at $BED7 targets $93BB where the shipped build targets $93BD ($BEDB), dating this image to before two separate 2-byte insertions in bank 04. Each bank was assembled into a shared 16 KB buffer that was not cleared between banks, so a bank whose real content stops early keeps the previous image's bytes. Never executed (bank 00 is pure map data). See docs/misc/bank-tail-residue.md"
  - space: prg
    offset: 0x3F8E
    name: Bk00_GraphicsResidue
    isDead: true
    desc: "84 bytes ($BF8E-$BFE1) of a deeper residue layer, older than the bank-04 image above it. Byte statistics are graphics-like (32×$00, 24×$42, 14×$7E; `7E 42 42 42 42 7E` is a textbook 8×8 CHR bitplane — a hollow box), not code and not DPCM. It is not a contiguous chunk of this ROM's CHR-ROM and appears nowhere else in PRG. Cannot be bank-04 padding (bank 04 pads this region with $FF). Identical in bank 01. Unidentified; left as .byte. See docs/misc/bank-tail-residue.md"
  - space: prg
    offset: 0x3FE2
    name: Bk00_SoundTrampolineResidue
    isDead: true
    desc: "18 bytes ($BFE2-$BFF3) — residue copy of bank 05's 6-slot sound trampoline block (JMP $0000 / JMP $8000 / JMP $8010 / JMP $0000 / JMP $0000 / JMP $806D). These targets are the OLD sound-engine entry points: the shipped bank 05 uses $8000/$8013/$8077, so this image predates a 3-byte growth of Sound_Init and a further 7-byte growth before Sound_Update. Dead here — bank 00 is pure map data and is never mapped in for sound. Identical in bank 01. See docs/misc/bank-tail-residue.md"
  - space: prg
    offset: 0x3FF4
    name: Bk00_BankEndStrayBytes
    isDead: true
    desc: "12 bytes ($BFF4-$BFFF) — a residue image of BANK 07's tail, not strays: `EE F4 FF 00 00 7E 00 00 F4 FF 7E 00`. In the fixed bank these same 12 bytes are the MMC1 reset stub (INC $FFF4 / JMP $F23B) followed by the CPU vectors; the RESET word ($BFFC = F4 FF) survives here intact. This is the OLDEST bank-07 image in the ROM: the JMP is not yet written and NMI reads $0000. Every bank 00-06 carries one of these. See docs/misc/bank-tail-residue.md (Clock 3)."
