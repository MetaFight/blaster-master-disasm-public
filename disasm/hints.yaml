    name: TileCheck_TransitionBit
    desc: |-
      The permissive transition-tile gate (A = combo attribute): is this tile a transition of ANY kind?
      Bit 3 is the shared "transition" bit, so this accepts the whole family — Gateway ($08), Tunnel ($0C)
      and Doorway ($88-family) alike. Returns $00 = accept, $FF = reject ($C0+ destroyable tiles are excluded).
      This is the gate for TankJason on foot, who may take every transition: DOWN-press entry ($82EF, both
      Gateways and Tunnels) and X-collision Doorway entry ($8234). Sophia's ladder/wall-climb probe ($940A)
      also uses it. The stricter Sophia counterpart is TileCheck_GatewaySophia ($D246), which subtracts the
      Tunnel family. Attribute classification per Trace6502 doorscan. (was TileCheck_TunnelBit — the old name
      implied Tunnels only, but bit 3 covers every transition type.)
  - space: prg
    offset: 0x1D23C
    desc: "tile <$C0 AND bit 3 set → $00; else $FF."
  - space: prg
    offset: 0x1D240
    name: _TileCheck_TransitionBit__No
    desc: "Return $FF (not a transition tile)"
  - space: prg
    offset: 0x1D243
    name: _TileCheck_TransitionBit__Yes
    desc: "Return $00 (transition tile)"
  - space: prg
    offset: 0x1D246
    name: TileCheck_GatewaySophia
    desc: |-
      The strict transition-tile gate (A = combo attribute): the transitions SOPHIA may take. Same bit-3
      transition family as TileCheck_TransitionBit ($D238) minus the Tunnel type — it additionally requires
      bit 2 clear, which rejects exactly Tunnel ($0C, bits 2+3) while accepting Gateway ($08) and Doorway
      ($88-family). Returns $00 = accept, $FF = reject. Sole caller is Sophia_GatewayCheck ($96E0), so in
      practice this is what lets Sophia drive through a Gateway to another area while a Tunnel (down into
      the overhead section) stays TankJason-only — he must dismount and walk in.
      Attribute classification per Trace6502 doorscan; every tank level carries 1-3 $08 Gateway combos
      (Level 7 has 21, matching the glossary's note that its Gateways move within the same area).
      (was TileCheck_TunnelSophia, described as accepting "Overhead→Tank Tunnels only" — backwards: $08 in a
      tank map is a Gateway, not a Tunnel. $08 does mean the return-to-tank point in an OVERHEAD map, which
      is where that reading came from, but neither bank-04 overhead code path calls this routine.)
  - space: prg
    offset: 0x1D24A
    desc: "tile <$C0 AND bits 3:2 == %10 (Gateway/Doorway, not Tunnel) → $00; else $FF."
  - space: prg
    offset: 0x1D250
    name: _TileCheck_GatewaySophia__No
    desc: "Return $FF (solid, or a Tunnel — not Sophia-passable)"
  - space: prg
    offset: 0x1D253
    name: _TileCheck_GatewaySophia__Yes
    desc: "Return $00 (Gateway/Doorway — Sophia may take it)"
  - space: prg
    offset: 0x1D256
    name: TileCheck_InstantDeathOrIce
    desc: "Overhead death/ice tile gate (A = tile attr). A tile with combo bits 2+4 ($14 = $10|$04 set) is INSTANT DEATH (zeroes ObjHealth $53 → OvhdJason death ObjType $05) — EXCEPT in the overhead area whose number equals the selector byte at $D265 (default $05 = Area 6 overhead), where the same tile is ICE (safe). Returns $FF=safe / $00 (+kill on death path). Called every frame from Player_Movement_Overhead via $C09F ($8C6E). Pairs with TileCheck_OverheadIceSlip ($D273) which adds the slide. esc0rtd3w: \"Bit 2&4 (0x14) = Instant Death or Ice (Level 6 Only)\"."
  - space: prg
    offset: 0x1D264
    desc: "CMP #$05: area $05 = Level 6 Overhead; overhead ice blocks act as ice rather than instant-death here (esc0rtd3w: \"Overhead Ice Section\"). Selector byte is the operand at $D265 (Game-Genie-able; external file offset $1D275)."
  - space: prg
    offset: 0x1D26D
    name: _TileCheck_InstantDeathOrIce__Killed
    desc: "Death path taken ($53 already zeroed): return $00"
  - space: prg
    offset: 0x1D270
    name: _TileCheck_InstantDeathOrIce__Safe
    desc: "Return $FF (safe / ice area)"
  - space: prg
    offset: 0x1D273
    name: TileCheck_OverheadIceSlip
    desc: "Overhead ice-slip gate (A = tile attr): returns $00 if combo bits 2+4 ($14) both set — caller then uses the momentum/accumulate velocity path (ObjApplyVelocity) → Jason SLIDES; else $FF → direct velocity (instant stop). No area check, so it only matters where the tile is survivable, i.e. Area 6 overhead (see TileCheck_InstantDeathOrIce $D256). Reached via the $C0A8 trampoline; called from Player_Movement_Overhead at $8CAC."
  - space: prg
    offset: 0x1D278
    desc: "Both combo bits set (masks $E6E5 then $E6E3) → return $00 (ice: caller uses the momentum/slide path); else $FF (instant stop)."
  - space: prg
